<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Medical | Master Enterprise System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pinnacle-red: #c1272d; --pinnacle-dark: #1a1a1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .wrapper { max-width: 1600px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 20px; min-height: 95vh; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--pinnacle-red); padding-bottom: 10px; margin-bottom: 15px; }
        .brand h1 { margin: 0; color: var(--pinnacle-red); font-size: 38px; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .brand span { font-size: 11px; font-weight: bold; color: #555; }
        #live-clock { font-size: 16px; font-weight: 800; color: var(--pinnacle-dark); background: #eee; padding: 5px 15px; border-radius: 5px; }
        .nav-bar { display: flex; flex-wrap: wrap; gap: 2px; background: #333; padding: 5px; border-radius: 5px 5px 0 0; }
        .nav-btn { flex: 1; min-width: 110px; padding: 12px 5px; border: none; background: transparent; color: #ccc; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .nav-btn:hover { background: #444; color: white; }
        .nav-btn.active { background: var(--pinnacle-red); color: white; }
        .sub-nav-hosp { display: flex; gap: 10px; background: #e9ecef; padding: 15px; border: 1px solid #ddd; border-top: none; overflow-x: auto; margin-bottom: 15px; }
        .hosp-btn { padding: 8px 18px; border-radius: 4px; border: 1px solid #bbb; background: white; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 700; }
        .hosp-btn.active { background: #007bff; color: white; border-color: #007bff; }
        .entry-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; align-items: end; }
        .entry-panel div label { display: block; font-size: 11px; font-weight: 800; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; font-size: 13px; box-sizing: border-box; }
        .table-container { overflow-x: auto; border: 1px solid #ddd; border-radius: 5px; max-height: 550px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--pinnacle-dark); color: white; padding: 12px; font-size: 11px; text-align: left; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 500; }
        tr:nth-child(even) { background: #fdfdfd; }
        tr:hover { background: #f1f1f1; }
        .status-overdue { color: #c1272d; font-weight: 900; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .status-ok { color: #27ae60; font-weight: 800; }
        .balance-zero { background: #fff5f5 !important; color: var(--pinnacle-red); font-weight: bold; }
        .action-ico { cursor: pointer; font-size: 16px; margin-right: 12px; }
        .ico-edit { color: #2980b9; }
        .ico-del { color: #c0392b; }
        .btn-main { background: #27ae60; color: white; border: none; padding: 11px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-print { background: var(--pinnacle-dark); color: white; border: none; padding: 11px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .print-only { display: none; }
        @media print {
            @page { size: A4; margin: 1cm; }
            .nav-bar, .sub-nav-hosp, .entry-panel, .action-ico, .btn-main, .btn-print, .search-bar { display: none !important; }
            .print-only { display: block; margin-top: 50px; }
            .sig-row { display: flex; justify-content: space-between; margin-top: 80px; }
            .sig-line { border-top: 2px solid black; width: 250px; text-align: center; padding-top: 5px; font-weight: bold; }
            table { font-size: 12px; border: 1px solid black; }
            th, td { border: 1px solid black !important; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-top">
        <div class="brand"><h1>Pinnacle</h1><span>MEDICAL SUPPLIES AND SERVICES UNLIMITED INC.</span></div>
        <div id="live-clock"></div>
    </div>
    <div class="nav-bar">
        <button class="nav-btn active" onclick="tab('stockin')">Stock In</button>
        <button class="nav-btn" onclick="tab('stockout')">Stock Out</button>
        <button class="nav-btn" onclick="tab('consignment')">Consignment</button>
        <button class="nav-btn" onclick="tab('returns')">Returns</button>
        <button class="nav-btn" onclick="tab('samples')">Samples</button>
        <button class="nav-btn" onclick="tab('dues')">30D Payments</button>
        <button class="nav-btn" onclick="tab('monthly')">Monthly Count</button>
        <button class="nav-btn" onclick="tab('reorder')">Reorder (0)</button>
        <button class="nav-btn" onclick="tab('inventory')">Inv. Balance</button>
        <button class="nav-btn" onclick="tab('setup')">Master Setup</button>
    </div>
    <div id="hosp-bar" class="sub-nav-hosp" style="display:none;"></div>
    <div class="entry-panel" id="entry-form"></div>
    <div class="search-bar" style="margin-bottom: 15px; display: flex; gap: 10px;">
        <input type="text" id="master-search" placeholder="Search current records..." onkeyup="render()">
        <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print A4 Page</button>
    </div>
    <div class="table-container"><table><thead id="h-table"></thead><tbody id="b-table"></tbody></table></div>
    <div class="print-only"><div class="sig-row"><div class="sig-line">PREPARED BY</div><div class="sig-line">RECEIVED BY</div></div></div>
</div>

<datalist id="data-items"></datalist><datalist id="data-targets"></datalist>

<script>
    let db = JSON.parse(localStorage.getItem('PINNACLE_MASTER_DB')) || { items: [], hospitals: [], clients: [], logs: [] };
    let activeTab = 'stockin'; let activeHosp = ''; let editId = null;

    function fmtD(dateStr) {
        if (!dateStr) return '--';
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString(undefined, options);
    }

    function init() {
        updateDatalists(); tab('stockin');
        setInterval(() => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('live-clock').innerText = new Date().toLocaleString(undefined, options);
        }, 1000);
    }

    function sync() {
        db.items.sort(); db.hospitals.sort(); db.clients.sort();
        localStorage.setItem('PINNACLE_MASTER_DB', JSON.stringify(db));
        updateDatalists(); render();
    }

    function updateDatalists() {
        document.getElementById('data-items').innerHTML = db.items.map(i => `<option value="${i}">`).join('');
        const all = [...db.hospitals, ...db.clients].sort();
        document.getElementById('data-targets').innerHTML = all.map(t => `<option value="${t}">`).join('');
    }

    function tab(name) {
        activeTab = name; editId = null;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().replace(/ /g,'') === name));
        const hb = document.getElementById('hosp-bar');
        if (name === 'consignment') {
            hb.style.display = 'flex';
            hb.innerHTML = db.hospitals.map(h => `<button class="hosp-btn ${activeHosp===h?'active':''}" onclick="setH('${h}')">${h}</button>`).join('');
            if (!activeHosp && db.hospitals.length > 0) activeHosp = db.hospitals[0];
        } else { hb.style.display = 'none'; }
        render();
    }

    function setH(h) { activeHosp = h; tab('consignment'); }

    function render() {
        const form = document.getElementById('entry-form'); const head = document.getElementById('h-table');
        const search = document.getElementById('master-search').value.toLowerCase();
        form.innerHTML = ''; head.innerHTML = '';

        if (activeTab === 'setup') {
            head.innerHTML = `<tr><th>Category</th><th>Name</th><th>Control</th></tr>`;
            form.innerHTML = `<div><label>Add Item</label><input id="in-i"></div><button class="btn-main" onclick="addM('items','in-i')">Add</button>
                <div><label>Add Hospital</label><input id="in-h"></div><button class="btn-main" onclick="addM('hospitals','in-h')">Add</button>
                <div><label>Add Client</label><input id="in-c"></div><button class="btn-main" onclick="addM('clients','in-c')">Add</button>`;
        } else if (activeTab === 'inventory' || activeTab === 'reorder') {
            head.innerHTML = `<tr><th>Item</th><th>Warehouse</th><th>Consigned</th><th>Grand Total</th></tr>`;
        } else if (activeTab === 'dues') {
            head.innerHTML = `<tr><th>Client</th><th>Inv Date</th><th>Due Date</th><th>SI No</th><th>Status</th></tr>`;
        } else if (activeTab === 'monthly') {
            head.innerHTML = `<tr><th>Item</th><th>Count</th><th>Source</th></tr>`;
            form.innerHTML = `<div><label>Month</label><select id="f-mon" onchange="render()">${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map((m,i)=>`<option value="${i}" ${new Date().getMonth()==i?'selected':''}>${m}</option>`).join('')}</select></div>
                             <div><label>Filter</label><input id="f-ent" list="data-targets" oninput="render()"></div>`;
        } else {
            renderFields(form);
            let h = `<tr><th>Date</th><th>Item</th><th>Qty</th>`;
            if(activeTab==='stockin') h+=`<th>Doc No</th>`;
            if(activeTab==='stockout') h+=`<th>SI No</th><th>Client</th>`;
            if(activeTab==='consignment') h+=`<th>DR No</th><th>C.O. No</th><th>Sold (SI)</th><th>Bal</th>`;
            if(activeTab==='returns' || activeTab==='samples') h+=`<th>Ref No</th><th>Source</th>`;
            head.innerHTML = h + `<th>Action</th></tr>`;
        }
        renderBody(search);
    }

    function renderFields(f) {
        f.innerHTML = `<div><label>Date</label><input type="date" id="e-date" value="${new Date().toISOString().split('T')[0]}"></div>
            <div><label>Item</label><input id="e-item" list="data-items"></div>
            <div><label>Qty</label><input type="number" id="e-qty"></div>
            ${activeTab==='stockin'?'<div><label>Doc No</label><input id="e-ref"></div>':''}
            ${activeTab==='stockout'?'<div><label>SI No</label><input id="e-ref"></div><div><label>Client</label><input id="e-target" list="data-targets"></div>':''}
            ${activeTab==='consignment'?'<div><label>DR No</label><input id="e-ref"></div><div><label>C.O. No</label><input id="e-co"></div><div><label>SI (If Sold)</label><input id="e-si"></div>':''}
            ${activeTab==='returns' || activeTab==='samples'?'<div><label>Ref No</label><input id="e-ref"></div><div><label>Source/Person</label><input id="e-target" list="data-targets"></div>':''}
            <button class="btn-main" onclick="process()">${editId?'UPDATE':'SAVE'}</button>`;
    }

    function renderBody(s) {
        const body = document.getElementById('b-table'); body.innerHTML = '';
        if (activeTab === 'setup') {
            db.items.forEach((x,i)=>addRow(body,['Item',x,`<i class="fas fa-trash ico-del" onclick="delM('items',${i})"></i>`],s));
            db.hospitals.forEach((x,i)=>addRow(body,['Hospital',x,`<i class="fas fa-trash ico-del" onclick="delM('hospitals',${i})"></i>`],s));
            db.clients.forEach((x,i)=>addRow(body,['Client',x,`<i class="fas fa-trash ico-del" onclick="delM('clients',${i})"></i>`],s));
        } else if (activeTab==='inventory' || activeTab==='reorder') {
            db.items.forEach(it => {
                const w = calc(it,'whse'); const c = calc(it,'cons');
                if (activeTab==='reorder' && (w+c)>0) return;
                let tr = addRow(body,[it,w,c,w+c],s); if ((w+c)===0) tr.classList.add('balance-zero');
            });
        } else if (activeTab==='dues') {
            db.logs.filter(l=>l.tab==='stockout').forEach(l=>{
                let dd = new Date(l.date); dd.setDate(dd.getDate()+30);
                addRow(body,[l.target, fmtD(l.date), fmtD(dd.toISOString().split('T')[0]), l.ref, new Date()>dd?`<span class="status-overdue">OVERDUE</span>` : `<span class="status-ok">OK</span>`],s);
            });
        } else {
            let data = db.logs.filter(l=>l.tab===activeTab && (activeTab!=='consignment' || l.hospital===activeHosp));
            data.reverse().forEach(l => {
                let cols = [fmtD(l.date), l.item, l.qty];
                if(activeTab==='stockin') cols.push(l.ref);
                if(activeTab==='stockout') cols.push(l.ref, l.target);
                if(activeTab==='consignment') {
                    let bal = db.logs.filter(x=>x.item===l.item && x.hospital===activeHosp && x.tab==='consignment' && x.id <= l.id);
                    let running = bal.reduce((a,b)=>a+(b.si?0:Number(b.qty)), 0) - bal.reduce((a,b)=>a+(b.si?Number(b.qty):0), 0);
                    cols.push(l.ref, l.co||'--', l.si||'--', running);
                }
                if(activeTab==='returns' || activeTab==='samples') cols.push(l.ref, l.target);
                cols.push(`<i class="fas fa-edit ico-edit action-ico" onclick="editL('${l.id}')"></i><i class="fas fa-trash ico-del action-ico" onclick="delL('${l.id}')"></i>`);
                addRow(body,cols,s);
            });
        }
    }

    function addRow(b,c,s) {
        if (s && !c.join(' ').toLowerCase().includes(s)) return {classList:{add:()=>{}}};
        let tr = document.createElement('tr');
        c.forEach(v => { let td=document.createElement('td'); td.innerHTML=v; tr.appendChild(td); });
        b.appendChild(tr); return tr;
    }

    function calc(item, mode) {
        const sum = (t) => db.logs.filter(l=>l.item===item && l.tab===t).reduce((a,b)=>a+Number(b.qty),0);
        const cons_sold = db.logs.filter(l=>l.item===item && l.tab==='consignment' && l.si).reduce((a,b)=>a+Number(b.qty),0);
        const cons_in = db.logs.filter(l=>l.item===item && l.tab==='consignment' && !l.si).reduce((a,b)=>a+Number(b.qty),0);
        if (mode==='whse') return (sum('stockin')+sum('returns')) - (sum('stockout')+sum('consignment')+sum('samples'));
        if (mode==='cons') return cons_in - cons_sold;
    }

    function process() {
        const item = document.getElementById('e-item').value;
        if (!db.items.includes(item)) return alert("Error: Item not in Master list.");
        const entry = { id: editId || Date.now(), tab: activeTab, date: document.getElementById('e-date').value, item: item, qty: document.getElementById('e-qty').value, ref: document.getElementById('e-ref')?.value || '', target: document.getElementById('e-target')?.value || '', hospital: activeHosp, co: document.getElementById('e-co')?.value || '', si: document.getElementById('e-si')?.value || '' };
        if (editId) db.logs = db.logs.map(l=>l.id == editId ? entry : l); else db.logs.push(entry);
        sync();
    }

    function editL(id) {
        const l = db.logs.find(x=>x.id==id); editId=id; render();
        document.getElementById('e-date').value = l.date; document.getElementById('e-item').value = l.item;
        document.getElementById('e-qty').value = l.qty;
        if(document.getElementById('e-ref')) document.getElementById('e-ref').value = l.ref;
        if(document.getElementById('e-target')) document.getElementById('e-target').value = l.target;
        if(document.getElementById('e-co')) document.getElementById('e-co').value = l.co;
        if(document.getElementById('e-si')) document.getElementById('e-si').value = l.si;
    }

    function addM(k,id) { let v = document.getElementById(id).value.trim(); if(v && !db[k].includes(v)) { db[k].push(v); sync(); document.getElementById(id).value=''; } }
    function delL(id) { if(confirm("Delete Record?")) { db.logs = db.logs.filter(l=>l.id!=id); sync(); } }
    function delM(k,i) { if(confirm("Delete Master Item?")) { db[k].splice(i,1); sync(); } }

    init();
</script>
</body>
</html>
